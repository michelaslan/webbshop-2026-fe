<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hakim Livs</title>
  <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
     <script src="script.js" defer></script>
     <script src="profilepage.js" defer></script>
</head>
<body>
  <button class="profile-button" aria-label="Open profile">
    <img src="public/user_icon.png" alt="User icon" />
  </button>

  <aside class="profile-panel" aria-hidden="true">
    <div class="profile-panel__header">
      <div>
        <p class="panel-title">Min profil</p>
        <p class="panel-subtitle">Hantera din profil och information</p>
      </div>
      <button class="panel-close" aria-label="Stäng profil">×</button>
    </div>

    <div class="profile-panel__body">
      <div class="profile-card">
        <div class="profile-avatar">
          <img src="public/user_icon.png" alt="Profilikon" />
        </div>
        <div>
          <p class="profile-name">Du</p>
        </div>
      </div>

      <div class="profile-detail">
        <p class="detail-label">Plats</p>
        <p id="profile-coordinates">59.3293, 18.0686</p>
      </div>

      <button class="profile-action-button" type="button">Redigera</button>
    </div>
  </aside>

  <div id="map"></div>
</body>
</html>
