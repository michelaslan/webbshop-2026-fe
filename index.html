<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hakim Livs</title>
  <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
     <script src="script.js" defer></script>
     <script src="profilepage.js" defer></script>
     <script src="addPlant.js" defer></script>
</head>
<body>
  <button class="profile-button" aria-label="Open profile">
    <img src="public/user_icon.png" alt="User icon" />
  </button>

  <aside class="profile-panel" aria-hidden="true">
    <div class="profile-panel__header">
      <div>
        <p class="panel-title">Min profil</p>
        <p class="panel-subtitle">Hantera din profil och information</p>
      </div>
      <button class="panel-close" aria-label="Stäng profil">×</button>
    </div>

    <div class="profile-panel__body">
      <div class="profile-card">
        <div class="profile-avatar">
          <img src="public/user_icon.png" alt="Profilikon" />
        </div>
        <div>
          <p class="profile-name" id="profile-name">Du</p>
          <p class="profile-email" id="profile-email">du@exempel.se</p>
        </div>
      </div>

      <div class="profile-detail">
        <p class="detail-label">Plats</p>
        <p id="profile-coordinates">59.3293, 18.0686</p>
      </div>

      <button class="profile-action-button" type="button">Redigera</button>
    </div>

    <div class="profile-edit-panel" aria-hidden="true">
      <div class="profile-edit-header">
        <div>
          <p class="panel-title">Redigera profil</p>
          <p class="panel-subtitle">Ändra dina uppgifter och lösenord</p>
        </div>
        <button class="profile-edit-close" aria-label="Stäng redigera profil">×</button>
      </div>

      <div class="profile-edit-body">
        <label class="form-field">
          <span>Namn</span>
          <input id="edit-name" type="text" value="Du" />
        </label>
        <label class="form-field">
          <span>E-post</span>
          <input id="edit-email" type="email" value="du@exempel.se" />
        </label>

        <p class="edit-password-label">Ändra lösenord <span>(valfritt)</span></p>
        <label class="form-field">
          <span>Nuvarande lösenord</span>
          <input id="current-password" type="password" placeholder="Ange ditt nuvarande lösenord" />
        </label>
        <label class="form-field">
          <span>Nytt lösenord</span>
          <input id="new-password" type="password" placeholder="Lämna tomt för att behålla" />
        </label>
        <label class="form-field">
          <span>Bekräfta lösenord</span>
          <input id="confirm-password" type="password" placeholder="Bekräfta nytt lösenord" />
        </label>

        <div class="profile-edit-actions">
          <button class="profile-edit-cancel" type="button">Avbryt</button>
          <button class="profile-edit-save" type="button">Spara</button>
        </div>
      </div>
    </div>
  </aside>

  
  <div id="map"></div>
  <button id="addPlantBtn">+</button>
  <aside class="addPlant-panel" aria-hidden="true">
    <button class="plantPanel-close" aria-label="Stäng profil">×</button>
    <input id="plantTypeInput" type="text" placeholder="Type of Plant">
    <select name="Light Level" id="LightLevelInput">
      <option value="1">Low Light</option>
      <option value="2">Day Light</option>
      <option value="3">Extreme Light</option>
    </select>
    <input type="file" accept="image/*" id="imageUpload" style="display:none">
    <button onclick="document.getElementById('imageUpload').click()">Upload Image</button>
    <button id="upload">Upload</button>
  </aside>


</body>
</html>
